<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
</head>
<body>
    
    <section class="h-screen w-full flex justify-center items-center ">
        <form id="form" class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
            <legend class="fieldset-legend">Login</legend>

            <label class="label">Email</label>
            <input id="email" required type="email" class="input" placeholder="Email" />

            <label class="label">Password</label>
            <input id="pass" required type="text" class="input" placeholder="Password" />

            <button id="login-btn" type="submit" class="btn btn-neutral mt-4">Login</button>
            </form>
        </section>


    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="src/script.js"></script>
</body>
</html>
